<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CrabBot 🦀</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --accent:   #ff5e1a;
      --accent2:  #ffb347;
      --text:     #f0ede8;
      --muted:    #666;
      --bot-bg:   #1c1c1c;
      --user-bg:  #ff5e1a18;
      --radius:   18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    header {
      width: 100%; max-width: 720px;
      padding: 20px 24px 14px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 44px; height: 44px; background: var(--accent);
      border-radius: 12px; display: grid; place-items: center; font-size: 22px;
    }
    .header-text h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
    .header-text p  { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
    .status-dot {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3a3a; transition: background 0.3s; }
    .dot.online { background: #4caf7d; box-shadow: 0 0 6px #4caf7d88; }

    #chat {
      flex: 1; width: 100%; max-width: 720px;
      overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: grid; place-items: center; font-size: 16px; flex-shrink: 0;
    }
    .msg.bot  .avatar { background: var(--accent); }
    .msg.user .avatar { background: #2a2a2a; }
    .bubble {
      max-width: 78%; padding: 12px 16px;
      border-radius: var(--radius); font-size: 0.88rem; line-height: 1.65;
    }
    .msg.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .msg.user .bubble { background: var(--user-bg); border: 1px solid #ff5e1a33; border-top-right-radius: 4px; }
    .bubble img.preview { width: 100%; max-width: 260px; border-radius: 10px; margin-top: 8px; display: block; }

    /* ── Result card ── */
    .result-card {
      margin-top: 10px; background: #0d0d0d;
      border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px;
    }
    .species-title {
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
      color: var(--accent2); margin-bottom: 10px;
    }
    .name-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-family: 'DM Mono', monospace; font-size: 0.75rem; }
    .name-table td { padding: 5px 8px; }
    .name-table td:first-child { color: var(--muted); width: 90px; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .row-english td:last-child { color: #f0ede8; font-weight: 500; }
    .row-science td:last-child { color: #7eb8f7; font-style: italic; }
    .row-tamil   td:last-child { color: #7ef7a0; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .confidence-label { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; }
    .bar-row { margin-top: 5px; }
    .bar-label { display: flex; justify-content: space-between; color: var(--muted); margin-bottom: 3px; font-size: 0.72rem; font-family: 'DM Mono', monospace; }
    .bar-track { background: #2a2a2a; border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.7s ease; }

    /* ── Typing ── */
    .typing .bubble { display: flex; align-items: center; gap: 5px; padding: 14px 16px; }
    .typing .bubble span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Chips ── */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip {
      background: #1e1e1e; border: 1px solid var(--border); border-radius: 20px;
      padding: 5px 12px; font-size: 0.75rem; cursor: pointer; color: var(--text);
      transition: border-color 0.2s, background 0.2s; font-family: 'DM Mono', monospace;
    }
    .chip:hover { border-color: var(--accent); background: #1f1410; }

    /* ── Input ── */
    #input-area { width: 100%; max-width: 720px; padding: 12px 20px 24px; border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #upload-btn {
      width: 44px; height: 44px; flex-shrink: 0; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
      display: grid; place-items: center; font-size: 20px; transition: border-color 0.2s, background 0.2s;
    }
    #upload-btn:hover { border-color: var(--accent); background: #1f1410; }
    #file-input { display: none; }
    #text-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 16px; color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 0.88rem; resize: none;
      outline: none; transition: border-color 0.2s; height: 44px;
    }
    #text-input:focus { border-color: var(--accent); }
    #text-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 44px; height: 44px; flex-shrink: 0; background: var(--accent);
      border: none; border-radius: 12px; cursor: pointer;
      display: grid; place-items: center; font-size: 20px; transition: opacity 0.2s, transform 0.1s;
    }
    #send-btn:hover  { opacity: 0.85; }
    #send-btn:active { transform: scale(0.93); }
    .hint { text-align: center; font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 8px; }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🦀</div>
  <div class="header-text">
    <h1>CrabBot</h1>
    <p>crab-species-classifier · v2.0</p>
  </div>
  <div class="status-dot">
    <div class="dot" id="dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <div class="input-row">
    <button id="upload-btn" title="Upload crab photo">📎</button>
    <input type="file" id="file-input" accept="image/*"/>
    <textarea id="text-input" placeholder="Ask me anything about crabs… or upload a photo!" rows="1"></textarea>
    <button id="send-btn">➤</button>
  </div>
  <p class="hint">📎 Upload photo to classify &nbsp;·&nbsp; 💬 Ask any crab question</p>
</div>

<script>
  // ── UPDATE THIS with your Cloudflare tunnel URL from Colab ────────────────
  const API = "https://signal-billion-exclusively-accordingly.trycloudflare.com";  // ← replace with https://xxxx.trycloudflare.com

  // ── Trilingual species data ───────────────────────────────────────────────
  const CRAB_INFO = {
    "flower_crab": {
      english:    "Flower Crab",
      scientific: "Portunus pelagicus",
      tamil:      "பூ நண்டு (Poo Nandu)"
    },
    "mud_crab": {
      english:    "Mud Crab",
      scientific: "Scylla serrata",
      tamil:      "சேற்று நண்டு (Shetru Nandu)"
    },
    "three_dot_crab": {
      english:    "Three-Spot Crab",
      scientific: "Portunus sanguinolentus",
      tamil:      "மூன்று புள்ளி நண்டு (Moonru Pulli Nandu)"
    }
  };

  const SUGGESTIONS = [
    "What do mud crabs eat? 🍴",
    "How to cook flower crab? 👨‍🍳",
    "Where do three-spot crabs live? 🌊",
    "Lifespan of a mud crab? ⏳",
    "நண்டு பற்றி சொல்லுங்க 🦀"
  ];

  const chat      = document.getElementById("chat");
  const fileInput = document.getElementById("file-input");
  const textInput = document.getElementById("text-input");
  const uploadBtn = document.getElementById("upload-btn");
  const sendBtn   = document.getElementById("send-btn");
  const dot       = document.getElementById("dot");
  const statusTxt = document.getElementById("status-text");

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      if (d.status === "ok" && d.model_loaded) {
        dot.classList.add("online"); statusTxt.textContent = "model ready";
      } else { statusTxt.textContent = "model not loaded"; }
    } catch { statusTxt.textContent = "backend offline"; }
  }
  checkHealth();

  function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

  function addMsg(role, html) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="avatar">${role === "bot" ? "🦀" : "👤"}</div><div class="bubble">${html}</div>`;
    chat.appendChild(div);
    scrollBottom();
    return div;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.innerHTML = `<div class="avatar">🦀</div><div class="bubble"><span></span><span></span><span></span></div>`;
    chat.appendChild(div);
    scrollBottom();
    return div;
  }

  function buildResultCard(data) {
    const info = CRAB_INFO[data.label] || { english: data.label, scientific: "Unknown", tamil: "தெரியவில்லை" };

    const bars = Object.entries(data.all_scores)
      .sort((a, b) => b[1] - a[1])
      .map(([name, pct]) => `
        <div class="bar-row">
          <div class="bar-label"><span>${CRAB_INFO[name]?.english || name}</span><span>${pct.toFixed(1)}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`).join("");

    return `
      <div class="result-card">
        <div class="species-title">🦀 ${info.english}</div>
        <table class="name-table">
          <tr class="row-english"><td>English</td><td>${info.english}</td></tr>
          <tr class="row-science"><td>Scientific</td><td>${info.scientific}</td></tr>
          <tr class="row-tamil">  <td>Tamil</td>    <td>${info.tamil}</td></tr>
        </table>
        <hr class="divider"/>
        <div class="confidence-label">Confidence: ${data.confidence.toFixed(1)}%</div>
        ${bars}
      </div>`;
  }

  async function askCrabAI(question) {
    const typing = addTyping();
    try {
      const response = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: question })
      });
      const data = await response.json();
      typing.remove();
      const answer = data.answer || "Sorry, I couldn't get an answer.";
      addMsg("bot", answer.replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>"));
    } catch {
      typing.remove();
      addMsg("bot", "⚠️ Couldn't connect to AI. Make sure your Colab tunnel is running.");
    }
  }

  async function classifyImage(file) {
    const imgUrl = await new Promise(res => {
      const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file);
    });
    addMsg("user", `<img class="preview" src="${imgUrl}" alt="crab photo"/>`);
    const typing = addTyping();
    const formData = new FormData();
    formData.append("image", file);
    try {
      const res  = await fetch(`${API}/predict`, { method: "POST", body: formData });
      const data = await res.json();
      typing.remove();
      if (data.error) {
        addMsg("bot", `⚠️ ${data.error}`);
      } else {
        addMsg("bot", `Here's what I found!${buildResultCard(data)}`);
        // Auto fun fact after classification
        const info = CRAB_INFO[data.label];
        if (info) {
          setTimeout(() => askCrabAI(
            `Tell me one interesting fun fact about the ${info.english} (${info.scientific}) in 2 sentences.`
          ), 1000);
        }
      }
    } catch {
      typing.remove();
      addMsg("bot", "⚠️ Could not reach the backend. Make sure your Colab tunnel is running.");
    }
  }

  async function handleText() {
    const msg = textInput.value.trim();
    if (!msg) return;
    addMsg("user", msg);
    textInput.value = "";
    await askCrabAI(msg);
  }

  function handleChip(question) {
    addMsg("user", question);
    askCrabAI(question);
  }

  uploadBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (file) { classifyImage(file); fileInput.value = ""; }
  });
  sendBtn.addEventListener("click", handleText);
  textInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleText(); }
  });

  setTimeout(() => {
    const chips = SUGGESTIONS.map(q =>
      `<span class="chip" onclick="handleChip('${q}')">${q}</span>`
    ).join("");
    addMsg("bot", `
      Hey! I'm <strong>CrabBot</strong> 🦀 v2.0<br><br>
      📸 <strong>Upload a crab photo</strong> → I'll identify it with its
      <span style="color:#f0ede8;font-weight:600">English</span>,
      <span style="color:#7eb8f7;font-style:italic">Scientific</span> &
      <span style="color:#7ef7a0">Tamil</span> names + a fun fact!<br>
      💬 <strong>Ask me anything</strong> about crabs in English or Tamil!
      <div class="chips">${chips}</div>
    `);
  }, 300);
</script>
</body>
</html>
