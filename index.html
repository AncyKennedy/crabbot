<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <title>CrabBot 🦀</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#010c1a;--deep:#030e20;--abyss:#051428;
      --electric:#0099ff;--iceblue:#40cfff;--frost:#b8eaff;
      --neon:#00ffcc;--coral:#ff4d6d;
      --amber:#ffaa00;--sand:#ffe8b0;--mist:#5a9fbf;
      --border:rgba(0,153,255,0.13);--r:20px;
      --flower:#ff9ecd;--mud:#00ffc8;--three:#ffd166;
      --glass:rgba(3,16,44,0.6);--glass2:rgba(0,8,24,0.82);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{height:100%;height:-webkit-fill-available;}
    body{
      background:var(--navy);color:#d8f0ff;
      font-family:'DM Sans',sans-serif;
      display:flex;flex-direction:column;align-items:center;
      height:100vh;height:100dvh;
      overflow:hidden;
      cursor:none;
      position:fixed;width:100%;
    }
    @media(pointer:coarse){body{cursor:auto;}}
    @media(pointer:coarse){#cursor,#cursorRing{display:none;}}

    /* ── CUSTOM CURSOR (desktop only) ── */
    #cursor{position:fixed;width:12px;height:12px;background:var(--electric);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 16px var(--electric),0 0 40px rgba(0,170,255,.4);mix-blend-mode:screen;transition:width .15s,height .15s,background .15s;}
    #cursorRing{position:fixed;width:36px;height:36px;border:1px solid rgba(0,170,255,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.7;transition:width .35s cubic-bezier(.23,1,.32,1),height .35s cubic-bezier(.23,1,.32,1),border-color .2s;}
    .cursor-grow #cursor{width:22px;height:22px;background:var(--iceblue);}
    .cursor-grow #cursorRing{width:56px;height:56px;border-color:var(--iceblue);opacity:.4;}

    /* ── OCEAN BG ── */
    #oceanBg{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(175deg,#010c1a 0%,#020f1e 30%,#030e20 60%,#04101e 100%);overflow:hidden;}
    #oceanBg::before{content:'';position:absolute;inset:0;background:
      radial-gradient(ellipse 55% 45% at 5% 20%,rgba(0,80,180,.32) 0%,transparent 65%),
      radial-gradient(ellipse 40% 60% at 92% 75%,rgba(0,40,120,.28) 0%,transparent 65%),
      radial-gradient(ellipse 70% 30% at 50% 110%,rgba(0,153,255,.09) 0%,transparent 55%),
      radial-gradient(ellipse 30% 25% at 75% 10%,rgba(0,200,255,.06) 0%,transparent 55%);}
    #oceanBg::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(0,120,255,.007) 4px,rgba(0,120,255,.007) 5px);}

    /* ── SEA FLOOR ── */
    #seaFloor{position:fixed;bottom:0;left:0;right:0;z-index:0;pointer-events:none;height:180px;opacity:.18;}

    /* ── PARTICLES ── */
    .p{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:rise linear infinite;background:radial-gradient(circle,var(--electric) 0%,transparent 70%);}
    @keyframes rise{0%{transform:translateY(105vh) translateX(0);opacity:0;}5%{opacity:1;}95%{opacity:.6;}100%{transform:translateY(-5vh) translateX(18px);opacity:0;}}

    /* ── INTRO 1.25s ── */
    #intro{position:fixed;inset:0;z-index:9990;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;animation:iOut .45s ease 1.1s forwards;}
    @keyframes iOut{to{opacity:0;pointer-events:none;}}
    .ic{font-size:90px;line-height:1;animation:iCrab 1s cubic-bezier(.22,1,.36,1) forwards;}
    @keyframes iCrab{0%{transform:scale(0) rotate(-30deg);opacity:0;}50%{transform:scale(1.2) rotate(6deg);opacity:1;}72%{transform:scale(.94) rotate(-3deg);}88%{transform:scale(1.05) rotate(1deg);}100%{transform:scale(60);opacity:0;}}
    .introWave{position:absolute;bottom:0;left:0;right:0;height:80px;animation:waveShift 2s ease-in-out infinite alternate;}
    @keyframes waveShift{0%{transform:translateX(-10px);}100%{transform:translateX(10px);}}
    .it{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--electric);letter-spacing:8px;opacity:0;animation:iFade .35s ease .28s forwards;text-shadow:0 0 30px rgba(0,170,255,.9),0 0 70px rgba(0,170,255,.4);}
    .isub{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:4px;color:var(--mist);opacity:0;animation:iFade .3s ease .5s forwards;}
    @keyframes iFade{to{opacity:1;}}
    .ibar{width:140px;height:2px;background:rgba(0,170,255,.15);border-radius:2px;overflow:hidden;opacity:0;animation:iFade .3s ease .55s forwards;}
    .ibar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--electric),var(--iceblue));border-radius:2px;box-shadow:0 0 10px var(--electric);animation:ibarFill .8s ease .55s forwards;}
    @keyframes ibarFill{to{width:100%;}}

    /* ══════════════════════════════════
       APP — THE KEY MOBILE FIX
       Use flex column with fixed height
       so the input bar never gets pushed
    ══════════════════════════════════ */
    #app{
      position:relative;z-index:1;
      width:100%;max-width:780px;
      height:100vh;height:100dvh;
      display:flex;flex-direction:column;
      opacity:0;animation:aIn .6s ease 1.25s forwards;
    }
    @keyframes aIn{to{opacity:1;}}

    /* ── HEADER (with micro-mode) ── */
    header{
      padding:11px 18px 10px;display:flex;align-items:center;gap:13px;
      border-bottom:1px solid rgba(0,153,255,.1);
      background:rgba(1,10,24,.82);backdrop-filter:blur(28px) saturate(180%);
      -webkit-backdrop-filter:blur(28px) saturate(180%);
      position:relative;overflow:hidden;flex-shrink:0;
      transition:padding .3s ease,gap .3s ease;
    }
    header.micro{padding:6px 14px 6px;gap:9px;}
    /* Animated shimmer border bottom */
    header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent 0%,rgba(0,153,255,.08) 15%,var(--electric) 40%,var(--iceblue) 60%,rgba(0,153,255,.08) 85%,transparent 100%);
      animation:hline 4s ease-in-out infinite;}
    @keyframes hline{0%,100%{opacity:.25;transform:scaleX(.4);}50%{opacity:1;transform:scaleX(1);}}
    /* Sonar rings from logo center */
    .sonarRing{position:absolute;left:40px;top:50%;border:1px solid rgba(0,153,255,.12);border-radius:50%;transform:translate(-50%,-50%);animation:sonar 3.5s ease-out infinite;pointer-events:none;}
    @keyframes sonar{0%{width:18px;height:18px;opacity:.7;}100%{width:110px;height:110px;opacity:0;}}
    .sonarRing:nth-child(2){animation-delay:1.1s;}.sonarRing:nth-child(3){animation-delay:2.2s;}
    /* Hexagonal logo */
    .logo{
      width:44px;height:44px;flex-shrink:0;position:relative;z-index:1;
      display:grid;place-items:center;font-size:22px;
      background:linear-gradient(145deg,#003580,#001a45);
      clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      box-shadow:0 0 28px rgba(0,153,255,.5),0 0 60px rgba(0,153,255,.15);
      animation:logoPulse 3.5s ease-in-out infinite;
      transition:width .3s,height .3s,font-size .3s;
    }
    header.micro .logo{width:30px;height:30px;font-size:15px;}
    @keyframes logoPulse{0%,100%{box-shadow:0 0 22px rgba(0,153,255,.45),0 0 50px rgba(0,153,255,.1);}50%{box-shadow:0 0 42px rgba(0,153,255,.8),0 0 80px rgba(0,153,255,.25);}}
    .htitle{
      font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:5px;
      background:linear-gradient(90deg,#fff 0%,var(--iceblue) 30%,var(--electric) 55%,var(--iceblue) 80%,#fff 100%);
      background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:shimmer 6s linear infinite;transition:font-size .3s;
    }
    header.micro .htitle{font-size:1.05rem;letter-spacing:3px;}
    @keyframes shimmer{to{background-position:300% center;}}
    .hsub{font-size:.58rem;color:rgba(90,159,191,.6);font-family:'DM Mono',monospace;margin-top:1px;letter-spacing:2px;transition:opacity .3s,max-height .3s;}
    header.micro .hsub{opacity:0;max-height:0;overflow:hidden;}
    .headerRight{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    /* Header action icons */
    .hIcons{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
    .hIcon{width:28px;height:28px;background:rgba(0,170,255,.08);border:1px solid rgba(0,170,255,.18);border-radius:8px;display:grid;place-items:center;cursor:pointer;font-size:13px;transition:all .2s;color:var(--mist);}
    .hIcon:hover{background:rgba(0,170,255,.18);border-color:var(--electric);color:var(--iceblue);transform:scale(1.1);}
    .hIcon.active{background:rgba(0,170,255,.2);border-color:var(--electric);color:var(--electric);}
    .depthMeter{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
    .depthLabel{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:1.5px;color:var(--mist);opacity:.7;}
    .depthTrack{width:60px;height:3px;background:rgba(0,170,255,.1);border-radius:2px;overflow:hidden;}
    .depthFill{height:100%;width:0%;background:linear-gradient(90deg,var(--electric),var(--iceblue));border-radius:2px;transition:width .4s ease;box-shadow:0 0 8px var(--electric);}
    .sdot{display:flex;align-items:center;gap:5px;font-size:.6rem;font-family:'DM Mono',monospace;color:var(--mist);}
    .dot{width:6px;height:6px;border-radius:50%;background:#0e2030;transition:all .4s;border:1px solid rgba(0,170,255,.2);}
    .dot.on{background:var(--electric);box-shadow:0 0 10px var(--electric);}

    /* ── SEARCH BAR ── */
    #searchBar{
      padding:0 14px;max-height:0;overflow:hidden;
      transition:max-height .35s ease,padding .35s ease;
      background:rgba(2,11,24,.9);backdrop-filter:blur(22px);
      flex-shrink:0;
    }
    #searchBar.open{max-height:52px;padding:8px 14px;}
    #searchInput{
      width:100%;background:rgba(0,20,50,.7);border:1px solid var(--border);
      border-radius:10px;padding:8px 14px;color:#d8f0ff;
      font-family:'DM Mono',monospace;font-size:.8rem;outline:none;
      transition:border-color .2s;
    }
    #searchInput:focus{border-color:var(--electric);box-shadow:0 0 0 2px rgba(0,170,255,.1);}
    #searchInput::placeholder{color:rgba(107,174,207,.4);}
    .msg.hidden{display:none;}
    .msg.highlight .bub{border-color:var(--amber)!important;box-shadow:0 0 20px rgba(255,170,0,.2)!important;}

    /* ── WAVE DIVIDER ── */
    .waveDivider{flex-shrink:0;height:20px;overflow:hidden;background:transparent;margin-top:-1px;}
    .waveDivider svg{display:block;width:100%;height:100%;}

    /* ── CHAT ── */
    #chat{
      flex:1;overflow-y:auto;overflow-x:hidden;
      padding:14px 14px 6px;
      display:flex;flex-direction:column;gap:12px;
      scrollbar-width:thin;scrollbar-color:rgba(0,170,255,.18) transparent;
      /* mobile overscroll */
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
      min-height:0; /* critical for flex shrink */
    }
    #chat::-webkit-scrollbar{width:3px;}
    #chat::-webkit-scrollbar-thumb{background:rgba(0,170,255,.18);border-radius:3px;}

    /* ── MESSAGES ── */
    .msg{display:flex;gap:10px;animation:mIn .4s cubic-bezier(.34,1.4,.64,1) both;}
    @keyframes mIn{from{opacity:0;transform:translateY(16px) scale(.95);}to{opacity:1;transform:none;}}
    .msg.user{flex-direction:row-reverse;}
    .msg-wrap{position:relative;max-width:78%;}

    /* ── Bookmarked indicator ── */
    .msg-wrap.bookmarked .bub{border-color:var(--amber)!important;}
    .msg-wrap.bookmarked::before{content:'🔖';position:absolute;top:-6px;left:-6px;font-size:10px;z-index:2;}

    /* ── Arrival glow ── */
    .msg.fresh .bub{animation:freshGlow 2.2s ease forwards;}
    @keyframes freshGlow{0%,25%{box-shadow:0 0 28px rgba(0,153,255,.55),inset 0 1px 0 rgba(0,153,255,.25);}100%{box-shadow:0 6px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(0,153,255,.06);}}

    /* Avatar */
    .av{width:34px;height:34px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;font-size:18px;
      background:linear-gradient(145deg,#003070,#001840);
      box-shadow:0 0 16px rgba(0,153,255,.5);
      transition:transform .22s cubic-bezier(.34,1.56,.64,1);cursor:default;
      border:1px solid rgba(0,153,255,.3);position:relative;}
    .msg.user .av{background:linear-gradient(145deg,#04152a,#020c1a);box-shadow:0 0 10px rgba(0,153,255,.15);border:1px solid rgba(0,153,255,.15);font-size:16px;}
    .av:hover{transform:scale(1.18) rotate(-14deg);}
    /* Online dot */
    .av-bot::after{content:'';position:absolute;bottom:1px;right:1px;width:8px;height:8px;background:var(--neon);border-radius:50%;border:2px solid var(--navy);box-shadow:0 0 10px var(--neon),0 0 20px rgba(0,255,200,.3);}

    /* Bubbles */
    .bub{padding:12px 16px;border-radius:var(--r);font-size:.875rem;line-height:1.75;position:relative;transition:box-shadow .2s,border-color .25s;}

    /* Bot bubble — glass with glowing left accent */
    .msg.bot .bub{
      background:var(--glass);
      border:1px solid rgba(0,153,255,.12);
      border-top-left-radius:4px;
      border-left:2px solid rgba(0,153,255,.35);
      box-shadow:0 6px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(0,153,255,.06),inset 0 0 40px rgba(0,30,80,.2);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .msg.bot .bub:hover{
      border-left-color:var(--electric);
      box-shadow:0 8px 36px rgba(0,0,0,.65),0 0 0 1px rgba(0,153,255,.15),inset 0 1px 0 rgba(0,153,255,.1);
    }

    /* User bubble — right accent coral tint */
    .msg.user .bub{
      background:linear-gradient(145deg,rgba(0,80,180,.18),rgba(0,50,130,.12));
      border:1px solid rgba(0,153,255,.2);
      border-top-right-radius:4px;
      border-right:2px solid rgba(0,153,255,.3);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    }
    .bub img.prev{width:100%;max-width:260px;border-radius:14px;margin-top:8px;display:block;border:1px solid rgba(0,153,255,.18);box-shadow:0 4px 20px rgba(0,0,0,.4);}

    /* ── HOVER ACTIONS ── */
    .msgActions{position:absolute;right:8px;top:-18px;display:flex;gap:4px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:10;}
    .msg-wrap:hover .msgActions{opacity:1;pointer-events:all;}
    /* on mobile show on long-press — handled via JS */
    .msg-wrap.show-actions .msgActions{opacity:1;pointer-events:all;}
    .actBtn{background:rgba(1,8,22,.95);border:1px solid rgba(0,80,180,.2);border-radius:8px;padding:4px 9px;font-size:.65rem;cursor:pointer;color:rgba(90,159,191,.8);transition:all .15s;font-family:'DM Mono',monospace;white-space:nowrap;backdrop-filter:blur(10px);}
    .actBtn:hover,.actBtn:active{background:rgba(0,60,160,.3);color:var(--iceblue);border-color:rgba(0,120,255,.4);}

    /* ── REACTIONS ── */
    .reactions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
    .rxn{background:rgba(0,80,160,.1);border:1px solid rgba(0,100,200,.18);border-radius:12px;padding:3px 8px;font-size:.75rem;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);display:inline-flex;align-items:center;gap:3px;}
    .rxn:hover,.rxn.active{background:rgba(0,100,200,.22);border-color:rgba(0,153,255,.45);transform:scale(1.1);box-shadow:0 2px 10px rgba(0,120,255,.2);}
    .rxn .cnt{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--mist);}

    /* ── TYPEWRITER CURSOR ── */
    .tw-cursor{display:inline-block;width:2px;height:1em;background:var(--electric);margin-left:2px;vertical-align:text-bottom;animation:blink .7s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

    /* ── RESULT CARD ── */
    .rc{margin-top:10px;background:rgba(2,10,28,.7);border:1px solid rgba(0,100,200,.18);border-left:2px solid rgba(0,153,255,.4);border-radius:16px;padding:14px 16px;box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(0,153,255,.06);backdrop-filter:blur(14px);}
    .sptitle{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--amber);margin-bottom:6px;text-shadow:0 0 22px rgba(255,170,0,.5);display:flex;align-items:center;gap:8px;}
    .dnaBadge{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:1.5px;padding:2px 8px;border-radius:6px;margin-left:auto;font-weight:500;text-transform:uppercase;}
    .dnaBadge.flower{background:rgba(255,158,205,.12);color:var(--flower);border:1px solid rgba(255,158,205,.25);}
    .dnaBadge.mud{background:rgba(77,255,176,.1);color:var(--mud);border:1px solid rgba(77,255,176,.22);}
    .dnaBadge.three{background:rgba(255,209,102,.1);color:var(--three);border:1px solid rgba(255,209,102,.22);}
    .nt{width:100%;border-collapse:collapse;margin:10px 0;font-family:'DM Mono',monospace;font-size:.71rem;}
    .nt td{padding:4px 8px;}.nt td:first-child{color:var(--mist);width:88px;font-size:.6rem;text-transform:uppercase;letter-spacing:.8px;}
    .re td:last-child{color:var(--sand);font-weight:500;}.rs td:last-child{color:var(--iceblue);font-style:italic;}.rt td:last-child{color:var(--frost);}
    .divLine{border:none;border-top:1px solid rgba(0,170,255,.1);margin:8px 0;}
    .clbl{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--mist);margin-bottom:6px;}
    .br{margin-top:6px;}.bl{display:flex;justify-content:space-between;color:var(--mist);margin-bottom:3px;font-size:.67rem;font-family:'DM Mono',monospace;}
    .btr{background:rgba(255,255,255,.04);border-radius:4px;height:6px;overflow:hidden;}
    .bf{height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,var(--electric),var(--iceblue));transition:width 1.1s cubic-bezier(.34,1.2,.64,1);position:relative;overflow:hidden;}
    .bf::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:barShine 2s ease 1.2s forwards;}
    @keyframes barShine{0%{left:-60%;}100%{left:160%;}}

    /* ── TYPING ── */
    .typing .bub{display:flex;align-items:center;gap:5px;padding:13px 16px;}
    .cd{font-size:16px;animation:cj 1.3s infinite;display:inline-block;}
    .cd:nth-child(2){animation-delay:.2s;}.cd:nth-child(3){animation-delay:.4s;}
    @keyframes cj{0%,60%,100%{transform:translateY(0) rotate(0deg);}30%{transform:translateY(-10px) rotate(-20deg);}}

    /* ── CHIPS ── */
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
    .chip{
      position:relative;
      background:linear-gradient(135deg,rgba(0,80,160,.2),rgba(0,40,100,.15));
      border-radius:22px;padding:6px 16px;font-size:.72rem;cursor:pointer;
      color:var(--iceblue);font-family:'DM Mono',monospace;
      transition:all .22s cubic-bezier(.34,1.56,.64,1);
      overflow:hidden;
      /* gradient border via pseudo */
      border:1px solid transparent;
      background-clip:padding-box;
      box-shadow:0 0 0 1px rgba(0,153,255,.25),inset 0 1px 0 rgba(255,255,255,.04);
    }
    .chip::before{
      content:'';position:absolute;inset:0;border-radius:22px;
      background:linear-gradient(135deg,rgba(0,153,255,.14),rgba(0,100,220,.06));
      opacity:0;transition:opacity .22s;
    }
    .chip:hover,.chip:active{
      transform:translateY(-3px) scale(1.04);
      box-shadow:0 0 0 1px var(--electric),0 6px 18px rgba(0,153,255,.28),inset 0 1px 0 rgba(255,255,255,.07);
      color:#fff;
    }
    .chip:hover::before,.chip:active::before{opacity:1;}

    /* ══════════════════════════════════
       INPUT BAR — MOBILE FIXED
    ══════════════════════════════════ */
    #ia{
      padding:8px 12px 10px;
      border-top:1px solid rgba(0,100,200,.08);
      background:rgba(1,7,18,.93);
      backdrop-filter:blur(30px) saturate(160%);
      -webkit-backdrop-filter:blur(30px) saturate(160%);
      position:relative;
      flex-shrink:0;
      padding-bottom:max(10px, env(safe-area-inset-bottom, 10px));
    }
    #ia::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,120,255,.35),rgba(64,207,255,.5),rgba(0,120,255,.35),transparent);
      opacity:.8;}
    .ir{display:flex;gap:7px;align-items:flex-end;}
    .ir.typing-active #ti{border-color:rgba(0,120,255,.5);box-shadow:0 0 0 3px rgba(0,120,255,.08);}

<script>
const API="https://ancyy22-crabbot.hf.space";

// ══════════════════════════════════
// MOBILE VIEWPORT FIX
// The definitive fix: listen to visualViewport resize
// and adjust the app height so input is always visible
// ══════════════════════════════════
function fixViewport(){
  const app=document.getElementById('app');
  if(window.visualViewport){
    function onVVResize(){
      const vv=window.visualViewport;
      // Set app height to the visual viewport height
      app.style.height=vv.height+'px';
      // Offset if viewport is shifted (e.g. floating keyboard)
      app.style.transform=`translateY(${vv.offsetTop}px)`;
      // Scroll chat to bottom whenever keyboard opens/closes
      setTimeout(()=>chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'}),100);
    }
    window.visualViewport.addEventListener('resize',onVVResize);
    window.visualViewport.addEventListener('scroll',onVVResize);
    onVVResize();
  }
}
fixViewport();

// ══════════════════════════════════
// CUSTOM CURSOR
// ══════════════════════════════════
const cursorDot=document.getElementById('cursor');
const cursorRing=document.getElementById('cursorRing');
let cx=0,cy=0,rx=0,ry=0;
if(window.matchMedia('(pointer:fine)').matches){
  document.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;cursorDot.style.left=cx+'px';cursorDot.style.top=cy+'px';});
  (function animCursor(){rx+=(cx-rx)*.1;ry+=(cy-ry)*.1;cursorRing.style.left=rx+'px';cursorRing.style.top=ry+'px';requestAnimationFrame(animCursor);})();
  document.querySelectorAll('button,.chip,.actBtn,.rxn,.hIcon').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-grow'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-grow'));
  });
}

// ══════════════════════════════════
// MAGNETIC SEND (desktop only)
// ══════════════════════════════════
const sb=document.getElementById('sb');
if(window.matchMedia('(pointer:fine)').matches){
  sb.addEventListener('mousemove',e=>{const r=sb.getBoundingClientRect();sb.style.transform=`translate(${(e.clientX-(r.left+r.width/2))*.28}px,${(e.clientY-(r.top+r.height/2))*.28}px)`;});
  sb.addEventListener('mouseleave',()=>{sb.style.transform='';});
}

// ══════════════════════════════════
// RIPPLE
// ══════════════════════════════════
function addRipple(el,e){
  const r=el.getBoundingClientRect();const rp=document.createElement('span');rp.className='ripple';
  const size=Math.max(r.width,r.height);
  const x=(e.clientX||e.touches?.[0]?.clientX||r.left+r.width/2)-r.left-size/2;
  const y=(e.clientY||e.touches?.[0]?.clientY||r.top+r.height/2)-r.top-size/2;
  rp.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  el.appendChild(rp);setTimeout(()=>rp.remove(),600);
}
document.querySelectorAll('.ib,#sb,.camBtn').forEach(btn=>{
  btn.addEventListener('click',e=>addRipple(btn,e));
  btn.addEventListener('touchend',e=>addRipple(btn,e));
});

// ══════════════════════════════════
// SOUNDS
// ══════════════════════════════════
function playPing(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(880,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+.3);g.gain.setValueAtTime(.07,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);o.start();o.stop(ctx.currentTime+.4);}catch(e){}}
function playBubble(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(600,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(900,ctx.currentTime+.1);g.gain.setValueAtTime(.05,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);o.start();o.stop(ctx.currentTime+.2);}catch(e){}}
function playSuccess(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[523,.0],[659,.12],[784,.24],[1047,.36]].forEach(([f,t])=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(.08,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.25);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.25);});}catch(e){}}

// TYPEWRITER
// ══════════════════════════════════
function typewrite(el,html,speed=11){
  const text=html;let i=0;el.innerHTML='';
  const cursor=document.createElement('span');cursor.className='tw-cursor';el.appendChild(cursor);
  return new Promise(resolve=>{
    const iv=setInterval(()=>{
      if(i<text.length){
        if(text[i]==='<'){const end=text.indexOf('>',i);if(end!==-1){cursor.insertAdjacentHTML('beforebegin',text.slice(i,end+1));i=end+1;}else{cursor.insertAdjacentHTML('beforebegin',text[i]);i++;}}
        else{cursor.insertAdjacentHTML('beforebegin',text[i]);i++;}
        chat.scrollTop=chat.scrollHeight;
      }else{cursor.remove();clearInterval(iv);resolve();}
    },speed);
  });
}

function addMsg(role,html,opts={}){
  checkMicroMode();
  const wrap=document.createElement('div');
  wrap.className=`msg ${role} fresh`;
  setTimeout(()=>wrap.classList.remove('fresh'),2200);

  const av=document.createElement('div');
  av.className='av'+(role==='bot'?' av-bot':'');
  av.textContent=role==='bot'?'🦀':'🧑';

  const msgWrap=document.createElement('div');
  msgWrap.className='msg-wrap';
  const bub=document.createElement('div');
  bub.className='bub';
  msgWrap.appendChild(bub);

  if(role==='bot'&&!opts.noActions){
    const actions=document.createElement('div');
    actions.className='msgActions';

    // Copy button
    const copyBtn=document.createElement('button');
    copyBtn.className='actBtn';copyBtn.textContent='📋';
    copyBtn.onclick=()=>{const tmp=document.createElement('div');tmp.innerHTML=bub.innerHTML;navigator.clipboard.writeText(tmp.textContent.trim()).then(()=>showToast('📋 Copied!'));};

    // Bookmark button
    const bmBtn=document.createElement('button');
    bmBtn.className='actBtn';bmBtn.textContent='🔖';
    bmBtn.onclick=()=>{
      const tmp=document.createElement('div');tmp.innerHTML=bub.innerHTML;
      addBookmark(tmp.textContent.trim().slice(0,200));
      msgWrap.classList.toggle('bookmarked');
      playBubble();
    };

    actions.appendChild(copyBtn);
    actions.appendChild(bmBtn);
    msgWrap.appendChild(actions);

    // Long-press to show actions on mobile
    let pressTimer;
    msgWrap.addEventListener('touchstart',()=>{pressTimer=setTimeout(()=>{msgWrap.classList.add('show-actions');playBubble();},500);});
    msgWrap.addEventListener('touchend',()=>clearTimeout(pressTimer));

    // Reactions
    const rxns=document.createElement('div');
    rxns.className='reactions';
    ['👍','🔥','🦀','💡'].forEach(emoji=>{
      const rxn=document.createElement('span');rxn.className='rxn';let cnt=0;
      rxn.innerHTML=`${emoji} <span class="cnt"></span>`;
      rxn.onclick=()=>{playBubble();rxn.classList.toggle('active');cnt+=rxn.classList.contains('active')?1:-1;rxn.querySelector('.cnt').textContent=cnt>0?cnt:'';};
      rxns.appendChild(rxn);
    });
    msgWrap.appendChild(rxns);
  }

  wrap.appendChild(av);wrap.appendChild(msgWrap);
  chat.appendChild(wrap);

  if(opts.typewrite){typewrite(bub,html);}
  else{bub.innerHTML=html;}
  scrollToBottom();return bub;
}

}

function getAnswer(q){
  const ql=q.toLowerCase();
  const sm=[{k:["flower","பூ நண்டு","poo nandu","pelagicus"],s:"flower_crab"},{k:["mud","சேற்று","shetru","serrata"],s:"mud_crab"},{k:["three","spot","மூன்று","moonru","sanguinolentus"],s:"three_dot_crab"}];
  const tm=[{k:["eat","food","diet","உணவு"],t:"diet"},{k:["live","habitat","where","வாழ்"],t:"habitat"},{k:["lifespan","how long","age","ஆயுள்"],t:"lifespan"},{k:["cook","recipe","curry","சமையல்"],t:"cooking"},{k:["size","big","large","அளவு"],t:"size"},{k:["price","cost","buy","விலை"],t:"price"},{k:["season","catch","when","பருவம்"],t:"season"},{k:["fact","about","பற்றி","சொல்லு"],t:"funfact"}];
  let ds=null,dt=null;
  for(const s of sm)if(s.k.some(k=>ql.includes(k))){ds=s.s;break;}
  for(const t of tm)if(t.k.some(k=>ql.includes(k))){dt=t.t;break;}
  if(ds&&dt)return CF[ds][dt];if(ds)return CF[ds].funfact;
  if(dt==="diet")return "All three crabs are omnivores! 🍴<br><b>Flower Crab</b> — fish & shrimp<br><b>Mud Crab</b> — crushes oysters & mussels<br><b>Three-Spot</b> — nocturnal hunter";
  if(dt==="habitat")return "Tamil Nadu crabs' habitats! 🌊<br><b>Flower Crab</b> — coastal waters<br><b>Mud Crab</b> — Pichavaram mangroves<br><b>Three-Spot</b> — Gulf of Mannar";
  for(const qa of GQA)if(qa.k.some(k=>ql.includes(k)))return qa.a;
  return "I know a lot about Tamil Nadu crabs! 🦀 Ask about diet, habitat, cooking, or price — or upload a photo! 📸";
}

}

const micBtn=document.getElementById('micBtn');
const voicePreview=document.getElementById('voicePreview');
let recognition=null;
let isListening=false;

function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('🎤 Voice not supported in this browser');return;}
  if(isListening){recognition?.stop();return;}
  recognition=new SR();
  recognition.lang='en-IN';recognition.interimResults=true;recognition.maxAlternatives=1;
  isListening=true;
  micBtn.classList.add('recording');
  voicePreview.innerHTML='<span class="voiceDot"></span><span class="voiceDot"></span><span class="voiceDot"></span>';
  voicePreview.classList.add('show');
  recognition.onresult=e=>{
    const transcript=Array.from(e.results).map(r=>r[0].transcript).join('');
    voicePreview.textContent='🎤 '+transcript;
    if(e.results[e.results.length-1].isFinal){
      ti.value=transcript;
      ti.dispatchEvent(new Event('input'));
    }
  };
  recognition.onend=()=>{
    isListening=false;
    micBtn.classList.remove('recording');
    voicePreview.classList.remove('show');
    if(ti.value.trim())send();
  };
  recognition.onerror=()=>{isListening=false;micBtn.classList.remove('recording');voicePreview.classList.remove('show');showToast('🎤 Could not hear. Try again!');};
  recognition.start();
}
micBtn.onclick=startVoice;

// ══════════════════════════════════
// KEYBOARD & SEND
// ══════════════════════════════════
document.getElementById('sb').onclick=send;
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
// On mobile, make sure tapping textarea scrolls chat to bottom first
ti.addEventListener('focus',()=>setTimeout(scrollToBottom,400));

// WELCOME
// ══════════════════════════════════
setTimeout(()=>{
  const bub=addMsg("bot","",{noActions:true});
  typewrite(bub,`வணக்கம்! I'm <strong>CrabBot</strong> 🦀`,8);
},1400);
</script>
